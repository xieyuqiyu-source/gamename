name: Deploy Neon Breaker

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: neon-breaker-production
  cancel-in-progress: true

jobs:
  trigger-server-deploy:
    name: Trigger server-side build and deploy
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deploy script on production server
        env:
          DEPLOY_HOST: ${{ secrets.NEON_BREAKER_DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.NEON_BREAKER_DEPLOY_USER }}
          DEPLOY_KEY: ${{ secrets.NEON_BREAKER_DEPLOY_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/neon_breaker_deploy
          chmod 600 ~/.ssh/neon_breaker_deploy
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts
          ssh -i ~/.ssh/neon_breaker_deploy \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            "$DEPLOY_USER@$DEPLOY_HOST" /usr/local/bin/deploy-neon-breaker
