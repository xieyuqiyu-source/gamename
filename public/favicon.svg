<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="title desc">
  <title id="title">霓虹破界图标</title>
  <desc id="desc">霓虹核心、小球和挡板组成的街机徽章</desc>
  <defs>
    <linearGradient id="bg" x1="8" y1="4" x2="56" y2="60" gradientUnits="userSpaceOnUse">
      <stop stop-color="#102a35"/>
      <stop offset="1" stop-color="#090b1d"/>
    </linearGradient>
    <linearGradient id="core" x1="19" y1="16" x2="45" y2="42" gradientUnits="userSpaceOnUse">
      <stop stop-color="#55f4dd"/>
      <stop offset=".52" stop-color="#e9fffb"/>
      <stop offset="1" stop-color="#a06cff"/>
    </linearGradient>
    <linearGradient id="paddle" x1="13" y1="52" x2="51" y2="52" gradientUnits="userSpaceOnUse">
      <stop stop-color="#20bda9"/>
      <stop offset=".5" stop-color="#effffc"/>
      <stop offset="1" stop-color="#b980ff"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect x="3" y="3" width="58" height="58" rx="17" fill="url(#bg)" stroke="#244a55" stroke-width="2"/>
  <path d="M32 12 48 26 32 42 16 26 32 12Z" fill="#0b1826" stroke="url(#core)" stroke-width="2.5" filter="url(#glow)"/>
  <path d="m32 17 10 9-10 10-10-10 10-9Z" fill="url(#core)" opacity=".92"/>
  <circle cx="32" cy="46" r="3.3" fill="#effffc" stroke="#55f4dd" stroke-width="1.2" filter="url(#glow)"/>
  <rect x="13" y="51" width="38" height="6" rx="3" fill="url(#paddle)" filter="url(#glow)"/>
  <path d="M10 19v-4a5 5 0 0 1 5-5h4M54 19v-4a5 5 0 0 0-5-5h-4" fill="none" stroke="#55f4dd" stroke-linecap="round" opacity=".65"/>
</svg>
